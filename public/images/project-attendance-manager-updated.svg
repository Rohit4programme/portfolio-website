<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Attendance Manager - Java Desktop Application</title>
  <desc id="desc">Comprehensive attendance and proxy management system with JavaFX UI</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb" />
      <stop offset="100%" stop-color="#388bfd" />
    </linearGradient>
    <linearGradient id="success" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" />
      <stop offset="100%" stop-color="#56d364" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)" />
  
  <!-- Main Dashboard Container -->
  <rect x="80" y="70" width="1040" height="560" rx="20" fill="#0d1117" stroke="#30363d" stroke-width="3" />
  
  <!-- Header Bar -->
  <rect x="80" y="70" width="1040" height="70" rx="20" fill="url(#accent)" />
  <text x="120" y="125" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">ATTENDANCE MANAGER</text>
  
  <!-- Left Sidebar -->
  <rect x="80" y="140" width="220" height="490" fill="#161b22" />
  <rect x="100" y="165" width="180" height="40" rx="8" fill="#1f6feb" />
  <text x="115" y="195" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Dashboard</text>
  <rect x="100" y="220" width="180" height="35" rx="6" fill="#30363d" />
  <text x="115" y="245" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">Attendance</text>
  <rect x="100" y="270" width="180" height="35" rx="6" fill="#30363d" />
  <text x="115" y="295" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">Proxy Requests</text>
  <rect x="100" y="320" width="180" height="35" rx="6" fill="#30363d" />
  <text x="115" y="345" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">Reports</text>
  <rect x="100" y="370" width="180" height="35" rx="6" fill="#30363d" />
  <text x="115" y="395" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">Settings</text>
  
  <!-- Main Content Area -->
  <rect x="320" y="165" width="780" height="440" fill="#0d1117" rx="12" />
  
  <!-- User Summary Cards -->
  <rect x="340" y="190" width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="365" cy="210" r="12" fill="#3fb950" />
  <text x="335" y="230" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="11">Active Students</text>
  <text x="365" y="265" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">245</text>
  
  <rect x="520" y="190" width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="545" cy="210" r="12" fill="#1f6feb" />
  <text x="515" y="230" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="11">Teachers</text>
  <text x="545" y="265" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">18</text>
  
  <rect x="700" y="190" width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="725" cy="210" r="12" fill="#f85149" />
  <text x="695" y="230" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="11">Avg Attendance</text>
  <text x="720" y="265" fill="#f85149" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">94%</text>
  
  <rect x="880" y="190" width="160" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="905" cy="210" r="12" fill="#ffa657" />
  <text x="880" y="230" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="11">Pending Proxies</text>
  <text x="910" y="265" fill="#ffa657" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">7</text>
  
  <!-- Attendance Table -->
  <rect x="340" y="320" width="700" height="260" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2" />
  
  <!-- Table Header -->
  <rect x="340" y="320" width="700" height="45" fill="#0d1117" rx="10" />
  <text x="360" y="350" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Student</text>
  <text x="520" y="350" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Date</text>
  <text x="650" y="350" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Status</text>
  <text x="950" y="350" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Action</text>
  
  <!-- Table Row 1 -->
  <line x1="340" y1="375" x2="1040" y2="375" stroke="#30363d" stroke-width="1" />
  <text x="360" y="400" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="12">Raj Kumar</text>
  <text x="520" y="400" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12">Mar 25, 2026</text>
  <circle cx="670" cy="395" r="6" fill="#3fb950" />
  <text x="690" y="400" fill="#3fb950" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Present</text>
  <text x="990" y="400" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-decoration="underline">Edit</text>
  
  <!-- Table Row 2 -->
  <line x1="340" y1="425" x2="1040" y2="425" stroke="#30363d" stroke-width="1" />
  <text x="360" y="450" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="12">Priya Singh</text>
  <text x="520" y="450" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12">Mar 25, 2026</text>
  <circle cx="670" cy="445" r="6" fill="#f85149" />
  <text x="690" y="450" fill="#f85149" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Absent</text>
  <text x="990" y="450" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-decoration="underline">Edit</text>
  
  <!-- Table Row 3 -->
  <line x1="340" y1="475" x2="1040" y2="475" stroke="#30363d" stroke-width="1" />
  <text x="360" y="500" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="12">Arjun Verma</text>
  <text x="520" y="500" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12">Mar 25, 2026</text>
  <circle cx="670" cy="495" r="6" fill="#ffa657" />
  <text x="690" y="500" fill="#ffa657" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Late</text>
  <text x="990" y="500" fill="#58a6ff" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-decoration="underline">Edit</text>
  
  <!-- Features Bar -->
  <text x="80" y="665" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✅ Role-Based Access (Admin, Teacher, Student) • SQLite/MySQL • PDF/Excel Reports • Secure Authentication</text>
  
  <!-- Title at Bottom -->
  <text x="80" y="695" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Java • JavaFX • BCrypt • Apache POI</text>
</svg>
