<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Image OCR - Java GUI Application</title>
  <desc id="desc">Optical character recognition desktop application with image text extraction</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560" />
      <stop offset="100%" stop-color="#f94f88" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)" />
  
  <!-- Main Window -->
  <rect x="60" y="40" width="1080" height="620" rx="16" fill="#0f3460" stroke="#e94560" stroke-width="3" />
  
  <!-- Title Bar -->
  <rect x="60" y="40" width="1080" height="50" rx="16" fill="url(#accent)" />
  <text x="90" y="72" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Image OCR - Text Extractor</text>
  
  <!-- Left Panel - Image Upload Area -->
  <rect x="85" y="110" width="420" height="500" rx="12" fill="#16213e" stroke="#e94560" stroke-width="2" stroke-dasharray="8,4" />
  <text x="295" y="310" fill="#a8b8c8" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">📤 Upload Image</text>
  <text x="295" y="335" fill="#7a8fa3" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">Click or drag image here</text>
  
  <!-- Sample Image in upload area -->
  <rect x="120" y="160" width="350" height="250" rx="8" fill="#1a2a40" />
  <rect x="140" y="185" width="150" height="120" fill="#e94560" opacity="0.3" rx="6" />
  <path d="M 220 245 L 270 185 L 290 220 L 310 200 L 340 280" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="165" cy="205" r="8" fill="#e94560" />
  
  <!-- Upload Button -->
  <rect x="120" y="555" width="350" height="40" rx="8" fill="#e94560" />
  <text x="295" y="581" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">SELECT IMAGE</text>
  
  <!-- Right Panel - Text Extraction Results -->
  <rect x="530" y="110" width="595" height="500" rx="12" fill="#16213e" stroke="#e94560" stroke-width="2" />
  
  <!-- Results Header -->
  <rect x="530" y="110" width="595" height="45" rx="12" fill="#0f3460" />
  <text x="560" y="140" fill="#e94560" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">EXTRACTED TEXT</text>
  <circle cx="1095" cy="132" r="6" fill="#2ecc71" />
  <text x="1105" y="137" fill="#2ecc71" font-family="Segoe UI, Arial, sans-serif" font-size="12">Ready</text>
  
  <!-- Extracted Text Area -->
  <rect x="550" y="170" width="555" height="300" rx="8" fill="#0f3460" />
  
  <!-- Sample extracted text -->
  <text x="570" y="195" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12" font-weight="500">Lorem ipsum dolor sit amet, consectetur adipiscing</text>
  <text x="570" y="220" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">elit. Sed do eiusmod tempor incididunt ut labore et</text>
  <text x="570" y="245" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">dolore magna aliqua. Ut enim ad minim veniam, quis</text>
  <text x="570" y="270" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">nostrud exercitation ullamco laboris nisi ut aliquip</text>
  <text x="570" y="295" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">ex ea commodo consequat. Duis aute irure dolor in</text>
  <text x="570" y="320" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">reprehenderit in voluptate velit esse cillum dolore</text>
  <text x="570" y="345" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">eu fugiat nulla pariatur. Excepteur sint occaecat</text>
  <text x="570" y="370" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">cupidatat non proident, sunt in culpa qui officia</text>
  <text x="570" y="395" fill="#c0d0e0" font-family="Courier New, monospace" font-size="12">deserunt mollit anim id est laborum.</text>
  
  <!-- Statistics Row -->
  <rect x="550" y="485" width="130" height="70" rx="8" fill="#1a2a40" stroke="#e94560" stroke-width="1" />
  <text x="615" y="500" fill="#a8b8c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Characters</text>
  <text x="615" y="525" fill="#e94560" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">847</text>
  
  <rect x="700" y="485" width="130" height="70" rx="8" fill="#1a2a40" stroke="#e94560" stroke-width="1" />
  <text x="765" y="500" fill="#a8b8c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Words</text>
  <text x="765" y="525" fill="#e94560" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">156</text>
  
  <rect x="850" y="485" width="130" height="70" rx="8" fill="#1a2a40" stroke="#e94560" stroke-width="1" />
  <text x="915" y="500" fill="#a8b8c8" font-family="Segoe UI, Arial, sans-serif" font-size="11">Confidence</text>
  <text x="915" y="525" fill="#2ecc71" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">98%</text>
  
  <!-- Action Buttons -->
  <rect x="550" y="570" width="170" height="35" rx="6" fill="#e94560" />
  <text x="635" y="593" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">COPY TEXT</text>
  
  <rect x="735" y="570" width="170" height="35" rx="6" fill="#1a2a40" stroke="#e94560" stroke-width="2" />
  <text x="820" y="593" fill="#e94560" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">SAVE FILE</text>
  
  <rect x="920" y="570" width="170" height="35" rx="6" fill="#1a2a40" stroke="#e94560" stroke-width="2" />
  <text x="1005" y="593" fill="#e94560" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">EXPORT PDF</text>
  
  <!-- Footer -->
  <text x="80" y="690" fill="#7a8fa3" font-family="Segoe UI, Arial, sans-serif" font-size="12">✅ Real-Time OCR Processing • Multi-Language Support • Tesseract Engine</text>
  <text x="900" y="690" fill="#7a8fa3" font-family="Segoe UI, Arial, sans-serif" font-size="12">Java • Swing/JavaFX</text>
</svg>
